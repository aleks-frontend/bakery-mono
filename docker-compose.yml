services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bakery
      POSTGRES_PASSWORD: bakery
      POSTGRES_DB: bakery
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bakery"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev -w @bakery/backend"
    env_file:
      - apps/backend/.env
    environment:
      DATABASE_URL: postgresql://bakery:bakery@postgres:5432/bakery
    ports:
      - "3001:3001"
    volumes:
      - .:/workspace
      - backend-node-modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  backend-node-modules:
